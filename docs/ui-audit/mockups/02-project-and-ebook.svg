<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="710" viewBox="0 0 1120 710" font-family="Inter, -apple-system, 'Segoe UI', sans-serif">
  <style>
    .norm{fill:#dcdcdc} .mut{fill:#9b9b9b} .faint{fill:#6b6b6b}
    .h{fill:#ededed;font-weight:600} .accent{fill:#a78bfa}
    .sm{font-size:11px} .xs{font-size:10px;letter-spacing:.06em} .base{font-size:13px} .lg{font-size:15px;font-weight:600}
    .mono{font-family:'SF Mono',ui-monospace,Menlo,monospace}
  </style>
  <rect width="1120" height="710" fill="#1e1e1e"/>
  <text x="24" y="30" class="h lg">Project tab stays lean — eBook metadata moves to its own roomy modal</text>

  <!-- ===== LEFT: lean Project tab ===== -->
  <rect x="24" y="56" width="320" height="600" rx="10" fill="#191919" stroke="#2e2e2e"/>
  <text x="40" y="52" class="faint sm">Project tab</text>

  <rect x="40" y="72" width="288" height="34" rx="7" fill="#202020" stroke="#383838"/>
  <rect x="52" y="84" width="10" height="10" rx="2" fill="none" stroke="#a78bfa" stroke-width="1.3"/>
  <text x="72" y="94" class="norm base">The Winter Garden</text>
  <path d="M308 87l6 7 6-7" stroke="#9b9b9b" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <text x="40" y="122" class="faint xs">projects/The Winter Garden/Index.md</text>

  <!-- tabs (Project active) -->
  <line x1="40" y1="152" x2="328" y2="152" stroke="#2a2a2a"/>
  <g class="base">
    <rect x="66" y="136" width="9" height="9" rx="2" fill="none" stroke="#6b6b6b" stroke-width="1.2"/>
    <text x="80" y="145" class="mut">Scenes</text>
    <rect x="160" y="136" width="9" height="9" rx="2" fill="none" stroke="#a78bfa" stroke-width="1.2"/>
    <text x="174" y="145" class="accent" font-weight="600">Project</text>
    <rect x="256" y="136" width="9" height="9" rx="2" fill="none" stroke="#6b6b6b" stroke-width="1.2"/>
    <text x="270" y="145" class="mut">Compile</text>
    <rect x="156" y="150" width="74" height="2.5" rx="1" fill="#8b5cf6"/>
  </g>

  <!-- overview one-liner (understated, no goals) -->
  <rect x="40" y="176" width="288" height="36" rx="9" fill="#1c1c1c"/>
  <text x="58" y="199" class="h base">12,480<tspan class="faint" font-weight="400"> words</tspan></text>
  <circle cx="168" cy="194" r="1.6" fill="#5a5a5a"/>
  <text x="182" y="199" class="mut base">34 scenes</text>
  <circle cx="274" cy="194" r="1.6" fill="#5a5a5a"/>
  <text x="288" y="199" class="mut base">3 acts</text>

  <!-- fields -->
  <text x="40" y="248" class="mut sm">Title</text>
  <rect x="40" y="256" width="288" height="32" rx="6" fill="#202020" stroke="#383838"/>
  <text x="52" y="277" class="norm base">The Winter Garden</text>

  <text x="40" y="312" class="mut sm">Scene folder</text>
  <rect x="40" y="320" width="288" height="32" rx="6" fill="#202020" stroke="#383838"/>
  <text x="52" y="341" class="norm base">/</text>

  <text x="40" y="376" class="mut sm">Scene template</text>
  <circle cx="132" cy="371" r="6.5" fill="none" stroke="#5a5a5a"/><text x="132" y="375" text-anchor="middle" class="faint" font-size="9">i</text>
  <rect x="40" y="384" width="288" height="32" rx="6" fill="#202020" stroke="#383838"/>
  <text x="52" y="405" class="mut base mono">templates/Scene.md</text>

  <line x1="40" y1="444" x2="328" y2="444" stroke="#2a2a2a"/>

  <!-- eBook launcher -->
  <rect x="40" y="460" width="288" height="58" rx="8" fill="#202020" stroke="#3a3a3a"/>
  <rect x="56" y="476" width="26" height="26" rx="4" fill="#26243a"/>
  <path d="M62 482v14M62 482h12a2 2 0 012 2v10" stroke="#a78bfa" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <text x="94" y="484" class="norm base" font-weight="600">eBook metadata</text>
  <text x="94" y="502" class="faint sm">Author · cover · ISBN · series…</text>
  <rect x="250" y="470" width="62" height="18" rx="9" fill="#26243a"/>
  <text x="281" y="483" text-anchor="middle" class="accent xs" font-weight="600">3 / 11 set</text>
  <path d="M306 482l6 7-6 7" stroke="#9b9b9b" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- advanced -->
  <path d="M48 544l6 5-6 5" stroke="#9b9b9b" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="66" y="552" class="mut base">Advanced (ignored files, drafts)</text>

  <text x="40" y="686" class="faint sm">One-line overview (no goals) · essentials only ·</text>
  <text x="40" y="702" class="faint sm">help behind ⓘ · “eBook metadata” opens the modal →</text>

  <!-- ===== RIGHT: eBook modal ===== -->
  <rect x="372" y="60" width="700" height="610" rx="12" fill="#1d1d1d" stroke="#3a3a3a"/>
  <!-- title -->
  <text x="396" y="98" class="h" font-size="17">eBook metadata</text>
  <text x="548" y="98" class="mut base">· The Winter Garden</text>
  <path d="M1042 84l16 16M1058 84l-16 16" stroke="#9b9b9b" stroke-width="1.6" stroke-linecap="round"/>
  <text x="396" y="120" class="faint sm">Written to Index.md front-matter · used when compiling to EPUB. Changes save automatically.</text>
  <line x1="396" y1="134" x2="1048" y2="134" stroke="#2e2e2e"/>

  <!-- IDENTITY -->
  <text x="396" y="160" class="faint xs">IDENTITY</text>
  <text x="396" y="182" class="mut sm">Author</text>
  <rect x="396" y="190" width="380" height="30" rx="6" fill="#202020" stroke="#383838"/>
  <text x="408" y="210" class="norm base">Mara Vale</text>
  <text x="800" y="182" class="mut sm">Language</text>
  <rect x="800" y="190" width="248" height="30" rx="6" fill="#202020" stroke="#383838"/>
  <text x="812" y="210" class="norm base mono">en</text>

  <text x="396" y="244" class="mut sm">Identifier</text>
  <rect x="396" y="252" width="540" height="30" rx="6" fill="#202020" stroke="#383838"/>
  <text x="408" y="272" class="mut base mono">urn:uuid:9f2a…c41</text>
  <rect x="948" y="252" width="100" height="30" rx="6" fill="#2a2a2a" stroke="#3a3a3a"/>
  <text x="998" y="272" text-anchor="middle" class="norm sm">Generate</text>

  <line x1="396" y1="302" x2="1048" y2="302" stroke="#262626"/>

  <!-- PUBLICATION -->
  <text x="396" y="326" class="faint xs">PUBLICATION</text>
  <text x="396" y="348" class="mut sm">Publisher</text>
  <rect x="396" y="356" width="380" height="30" rx="6" fill="#202020" stroke="#383838"/>
  <text x="408" y="376" class="norm base">Harbour &amp; Vale</text>
  <text x="800" y="348" class="mut sm">Publication date</text>
  <rect x="800" y="356" width="248" height="30" rx="6" fill="#202020" stroke="#383838"/>
  <text x="812" y="376" class="norm base mono">2026-03-14</text>

  <text x="396" y="410" class="mut sm">Rights</text>
  <rect x="396" y="418" width="652" height="30" rx="6" fill="#202020" stroke="#383838"/>
  <text x="408" y="438" class="mut base">© 2026 Mara Vale. All rights reserved.</text>

  <line x1="396" y1="468" x2="1048" y2="468" stroke="#262626"/>

  <!-- CLASSIFICATION + COVER -->
  <text x="396" y="492" class="faint xs">CLASSIFICATION</text>
  <text x="396" y="514" class="mut sm">Series</text>
  <rect x="396" y="522" width="240" height="30" rx="6" fill="#202020" stroke="#383838"/>
  <text x="408" y="542" class="norm base">The Tidewater Cycle</text>
  <text x="656" y="514" class="mut sm">Book #</text>
  <rect x="656" y="522" width="80" height="30" rx="6" fill="#202020" stroke="#383838"/>
  <text x="668" y="542" class="norm base mono">2</text>

  <text x="396" y="580" class="mut sm">Subjects</text>
  <rect x="396" y="588" width="86" height="24" rx="12" fill="#26243a"/><text x="416" y="604" class="accent sm">fiction ✕</text>
  <rect x="492" y="588" width="94" height="24" rx="12" fill="#26243a"/><text x="512" y="604" class="accent sm">fantasy ✕</text>
  <rect x="596" y="588" width="60" height="24" rx="12" fill="none" stroke="#3a3a3a" stroke-dasharray="3 3"/><text x="612" y="604" class="faint sm">+ add</text>

  <!-- cover thumbnail (right of classification) -->
  <text x="800" y="514" class="mut sm">Cover</text>
  <rect x="800" y="522" width="66" height="90" rx="4" fill="#26243a" stroke="#3a3a3a"/>
  <path d="M812 560h42M812 572h30" stroke="#7c6cd0" stroke-width="2" stroke-linecap="round"/>
  <text x="820" y="548" class="accent sm">TIDE</text>
  <rect x="878" y="540" width="90" height="26" rx="6" fill="#2a2a2a" stroke="#3a3a3a"/>
  <text x="923" y="557" text-anchor="middle" class="norm sm">Replace…</text>
  <text x="878" y="590" class="faint sm">assets/cover.png</text>

  <!-- footer -->
  <line x1="396" y1="632" x2="1048" y2="632" stroke="#2e2e2e"/>
  <text x="396" y="656" class="faint sm">Fields map to EPUB / Dublin Core · saved to front-matter automatically.</text>
  <rect x="976" y="642" width="72" height="28" rx="6" fill="#8b5cf6"/>
  <text x="1012" y="661" text-anchor="middle" fill="#fff" class="base" font-weight="600">Done</text>

  <text x="372" y="702" class="faint sm">Grouped (Identity / Publication / Classification) · two columns · cover preview · no walls of help text.</text>
</svg>
