<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="650" viewBox="0 0 1120 650" font-family="Inter, -apple-system, 'Segoe UI', sans-serif">
  <style>
    .norm{fill:#dcdcdc} .mut{fill:#9b9b9b} .faint{fill:#6b6b6b}
    .h{fill:#ededed;font-weight:600} .accent{fill:#a78bfa}
    .sm{font-size:11px} .xs{font-size:10px;letter-spacing:.06em} .base{font-size:13px} .lg{font-size:15px;font-weight:600}
    /* status vocabulary (from frontmatter `status`) */
    .s-draft{fill:#e0a52b} .s-rev{fill:#5b9bf5} .s-comp{fill:#52c294} .s-scrap{fill:#f0616d}
  </style>
  <rect width="1120" height="650" fill="#1e1e1e"/>
  <text x="24" y="30" class="h lg">Scenes — refined List (default) + Card view (wide, grouped by depth)</text>

  <!-- ============ LEFT: LIST (narrow 320) ============ -->
  <rect x="24" y="56" width="320" height="556" rx="10" fill="#191919" stroke="#2e2e2e"/>
  <text x="40" y="52" class="faint sm">320 px · everyday default width</text>

  <rect x="40" y="72" width="288" height="34" rx="7" fill="#202020" stroke="#383838"/>
  <rect x="52" y="84" width="10" height="10" rx="2" fill="none" stroke="#a78bfa" stroke-width="1.3"/>
  <text x="72" y="94" class="norm base">The Winter Garden</text>
  <path d="M308 87l6 7 6-7" stroke="#9b9b9b" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <text x="40" y="122" class="faint xs">projects/The Winter Garden/Index.md</text>

  <!-- fixed tab bar -->
  <line x1="40" y1="152" x2="328" y2="152" stroke="#2a2a2a"/>
  <g class="base">
    <rect x="66" y="136" width="9" height="9" rx="2" fill="none" stroke="#a78bfa" stroke-width="1.2"/>
    <text x="80" y="145" class="accent" font-weight="600">Scenes</text>
    <rect x="160" y="136" width="9" height="9" rx="2" fill="none" stroke="#6b6b6b" stroke-width="1.2"/>
    <text x="174" y="145" class="mut">Project</text>
    <rect x="256" y="136" width="9" height="9" rx="2" fill="none" stroke="#6b6b6b" stroke-width="1.2"/>
    <text x="270" y="145" class="mut">Compile</text>
    <rect x="62" y="150" width="72" height="2.5" rx="1" fill="#8b5cf6"/>
  </g>

  <!-- count + 3-way view switcher -->
  <text x="40" y="182" class="faint sm">12 scenes</text>
  <rect x="192" y="169" width="136" height="20" rx="6" fill="#202020" stroke="#333"/>
  <rect x="194" y="171" width="42" height="16" rx="5" fill="#33334a"/>
  <text x="215" y="182" text-anchor="middle" class="accent xs" font-weight="600">List</text>
  <text x="258" y="182" text-anchor="middle" class="mut xs">Cards</text>
  <text x="305" y="182" text-anchor="middle" class="mut xs">Outline</text>

  <!-- rows -->
  <text x="52" y="216" class="norm base">1</text><text x="76" y="216" class="norm base">Opening Image</text>
  <text x="288" y="216" text-anchor="end" class="faint sm">820</text><text x="312" y="217" class="s-comp base">●</text>
  <line x1="40" y1="230" x2="328" y2="230" stroke="#242424"/>

  <rect x="30" y="234" width="314" height="34" rx="7" fill="#26243a"/><rect x="30" y="234" width="3" height="34" rx="1.5" fill="#8b5cf6"/>
  <text x="52" y="255" class="h base">2</text><text x="76" y="255" class="h base">The Ask</text>
  <text x="288" y="255" text-anchor="end" class="mut sm">610</text><text x="312" y="256" class="s-rev base">●</text>

  <rect x="30" y="272" width="314" height="34" rx="7" fill="#232323"/>
  <text x="40" y="293" class="faint sm">⠿</text><text x="56" y="293" class="norm base">3</text><text x="76" y="293" class="norm base">Refusal</text>
  <text x="288" y="293" text-anchor="end" class="faint sm">540</text><text x="312" y="294" class="s-draft base">●</text>

  <text x="52" y="331" class="norm base">4</text><text x="76" y="331" class="norm base">Meeting the Mentor</text>
  <text x="288" y="331" text-anchor="end" class="faint sm">1,120</text><text x="312" y="332" class="s-comp base">●</text>
  <line x1="40" y1="345" x2="328" y2="345" stroke="#242424"/>

  <text x="52" y="369" class="norm base">5</text><text x="76" y="369" class="norm base">First Threshold</text>
  <text x="288" y="369" text-anchor="end" class="faint sm">300</text><text x="312" y="370" class="s-draft base">●</text>
  <line x1="40" y1="383" x2="328" y2="383" stroke="#242424"/>

  <text x="52" y="407" class="norm base">6</text><text x="76" y="407" class="norm base">Tests &amp; Allies</text>
  <text x="288" y="407" text-anchor="end" class="faint sm">980</text><text x="312" y="408" class="s-rev base">●</text>
  <line x1="40" y1="421" x2="328" y2="421" stroke="#242424"/>

  <text x="52" y="445" class="norm base">7</text><text x="76" y="445" class="norm base">Approach</text>
  <text x="288" y="445" text-anchor="end" class="faint sm">140</text><text x="312" y="446" class="s-scrap base">●</text>

  <rect x="40" y="558" width="288" height="34" rx="7" fill="#1c1c1c" stroke="#383838"/>
  <text x="54" y="580" class="accent base" font-weight="600">＋</text><text x="74" y="580" class="faint base">New scene</text>

  <!-- ============ RIGHT: CARDS (wide, grouped) ============ -->
  <rect x="372" y="56" width="724" height="556" rx="10" fill="#191919" stroke="#2e2e2e"/>
  <text x="388" y="52" class="faint sm">same pane, widened · Card view fills the space; groups from Index.md depth (Act = collapsible header, two levels)</text>

  <rect x="388" y="72" width="300" height="30" rx="7" fill="#202020" stroke="#383838"/>
  <rect x="400" y="82" width="10" height="10" rx="2" fill="none" stroke="#a78bfa" stroke-width="1.3"/>
  <text x="420" y="91" class="norm base">The Winter Garden</text>
  <path d="M668 84l6 7 6-7" stroke="#9b9b9b" stroke-width="1.4" fill="none" stroke-linecap="round"/>
  <rect x="944" y="72" width="136" height="28" rx="7" fill="#202020" stroke="#333"/>
  <text x="967" y="90" text-anchor="middle" class="mut xs">List</text>
  <rect x="990" y="74" width="44" height="24" rx="6" fill="#33334a"/><text x="1012" y="90" text-anchor="middle" class="accent xs" font-weight="600">Cards</text>
  <text x="1058" y="90" text-anchor="middle" class="mut xs">Outline</text>

  <!-- ACT I header (collapsible) -->
  <path d="M394 128l6 6 6-6" stroke="#dcdcdc" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <text x="414" y="138" class="h base">Act I — Setup</text>
  <text x="1064" y="138" text-anchor="end" class="mut sm">5 scenes · 3,390 w</text>

  <!-- Act I cards row (3) -->
  <!-- card 1 -->
  <rect x="392" y="150" width="216" height="104" rx="8" fill="#202020" stroke="#2e2e2e"/>
  <text x="406" y="176" class="faint base">1</text><text x="424" y="176" class="norm base" font-weight="600">Opening Image</text>
  <text x="406" y="200" class="faint sm">Fog over the harbour wall;</text>
  <text x="406" y="216" class="faint sm">Mara finds the letter.</text>
  <text x="407" y="238" class="s-comp base">●</text><text x="422" y="238" class="mut sm">complete</text>
  <text x="594" y="238" text-anchor="end" class="faint sm">820 w</text>
  <!-- card 2 (selected) -->
  <rect x="626" y="150" width="216" height="104" rx="8" fill="#26243a" stroke="#8b5cf6"/>
  <text x="640" y="176" class="faint base">2</text><text x="658" y="176" class="h base">The Ask</text>
  <text x="640" y="200" class="faint sm">The envoy names her price;</text>
  <text x="640" y="216" class="faint sm">Mara refuses to answer.</text>
  <text x="641" y="238" class="s-rev base">●</text><text x="656" y="238" class="mut sm">revising</text>
  <text x="828" y="238" text-anchor="end" class="mut sm">610 w</text>
  <!-- card 3 -->
  <rect x="860" y="150" width="216" height="104" rx="8" fill="#202020" stroke="#2e2e2e"/>
  <text x="874" y="176" class="faint base">3</text><text x="892" y="176" class="norm base" font-weight="600">Refusal</text>
  <text x="874" y="200" class="faint sm">She walks out into the</text>
  <text x="874" y="216" class="faint sm">rain, decision unmade.</text>
  <text x="875" y="238" class="s-draft base">●</text><text x="890" y="238" class="mut sm">draft</text>
  <text x="1062" y="238" text-anchor="end" class="faint sm">540 w</text>

  <!-- ACT II header -->
  <path d="M394 288l6 6 6-6" stroke="#dcdcdc" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <text x="414" y="298" class="h base">Act II — Confrontation</text>
  <text x="1064" y="298" text-anchor="end" class="mut sm">4 scenes · 4,260 w</text>
  <!-- card 4 -->
  <rect x="392" y="310" width="216" height="104" rx="8" fill="#202020" stroke="#2e2e2e"/>
  <text x="406" y="336" class="faint base">4</text><text x="424" y="336" class="norm base" font-weight="600">Meeting the Mentor</text>
  <text x="406" y="360" class="faint sm">An old cartographer offers</text>
  <text x="406" y="376" class="faint sm">a map with one road missing.</text>
  <text x="407" y="398" class="s-comp base">●</text><text x="422" y="398" class="mut sm">complete</text>
  <text x="594" y="398" text-anchor="end" class="faint sm">1,120 w</text>
  <!-- card 5 -->
  <rect x="626" y="310" width="216" height="104" rx="8" fill="#202020" stroke="#2e2e2e"/>
  <text x="640" y="336" class="faint base">5</text><text x="658" y="336" class="norm base" font-weight="600">First Threshold</text>
  <text x="640" y="360" class="faint sm">Mara crosses the tideline</text>
  <text x="640" y="376" class="faint sm">against every warning.</text>
  <text x="641" y="398" class="s-draft base">●</text><text x="656" y="398" class="mut sm">draft</text>
  <text x="828" y="398" text-anchor="end" class="faint sm">300 w</text>
  <!-- card 6 -->
  <rect x="860" y="310" width="216" height="104" rx="8" fill="#202020" stroke="#2e2e2e"/>
  <text x="874" y="336" class="faint base">6</text><text x="892" y="336" class="norm base" font-weight="600">Tests &amp; Allies</text>
  <text x="874" y="360" class="faint sm">Cut for now — may fold into</text>
  <text x="874" y="376" class="faint sm">the ordeal chapter.</text>
  <text x="875" y="398" class="s-scrap base">●</text><text x="890" y="398" class="mut sm">scrap</text>
  <text x="1062" y="398" text-anchor="end" class="faint sm">980 w</text>

  <!-- ACT III collapsed -->
  <path d="M395 434l6 5-6 5" stroke="#9b9b9b" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="414" y="442" class="mut base">Act III — Resolution</text>
  <text x="1064" y="442" text-anchor="end" class="faint sm">3 scenes · 2,110 w · collapsed</text>

  <line x1="388" y1="462" x2="1080" y2="462" stroke="#2a2a2a"/>
  <text x="404" y="484" class="mut sm">12 scenes · 9,760 words</text>
  <text x="1064" y="484" text-anchor="end" class="faint sm">drag cards to reorder or move between acts</text>

  <!-- status legend (shared) -->
  <text x="24" y="632" class="faint sm">Status bullet from front-matter <tspan class="norm">status:</tspan></text>
  <text x="270" y="632" class="s-draft base">●</text><text x="286" y="632" class="mut sm">draft</text>
  <text x="330" y="632" class="s-rev base">●</text><text x="346" y="632" class="mut sm">revising</text>
  <text x="410" y="632" class="s-comp base">●</text><text x="426" y="632" class="mut sm">complete</text>
  <text x="500" y="632" class="s-scrap base">●</text><text x="516" y="632" class="mut sm">scrap</text>
  <text x="580" y="632" class="faint sm">·  cards group by depth (Act = collapsible header), two levels max.</text>
</svg>
