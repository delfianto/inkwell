<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="720" viewBox="0 0 1120 720" font-family="Inter, -apple-system, 'Segoe UI', sans-serif">
  <style>
    .norm{fill:#dcdcdc} .mut{fill:#9b9b9b} .faint{fill:#6b6b6b}
    .h{fill:#ededed;font-weight:600} .accent{fill:#a78bfa} .mono{font-family:'SF Mono',ui-monospace,Menlo,monospace}
    .sm{font-size:11px} .xs{font-size:10px;letter-spacing:.08em} .base{font-size:13px} .lg{font-size:16px;font-weight:600}
  </style>

  <!-- app background -->
  <rect width="1120" height="720" fill="#1e1e1e"/>
  <text x="24" y="30" class="h lg" font-size="15">Compile — full-pane workflow builder</text>
  <text x="24" y="50" class="faint sm">Opens as a workspace tab (⌘-click the workflow, or "Open builder"). Not the sidebar.</text>

  <!-- pane frame -->
  <rect x="24" y="66" width="1072" height="590" rx="10" fill="#181818" stroke="#2e2e2e"/>

  <!-- top toolbar -->
  <g>
    <rect x="24" y="66" width="1072" height="54" rx="10" fill="#1c1c1c"/>
    <rect x="24" y="110" width="1072" height="10" fill="#1c1c1c"/>
    <circle cx="48" cy="93" r="9" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
    <path d="M44 93h8M48 89v8" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round"/>
    <text x="66" y="98" class="h lg">Compile</text>
    <text x="150" y="98" class="mut base">· The Winter Garden</text>
    <!-- workflow select -->
    <text x="770" y="98" class="faint sm">Workflow</text>
    <rect x="828" y="80" width="150" height="26" rx="6" fill="#202020" stroke="#383838"/>
    <text x="840" y="97" class="norm base">Default</text>
    <path d="M960 90l5 6 5-6" stroke="#9b9b9b" stroke-width="1.4" fill="none" stroke-linecap="round"/>
    <!-- overflow -->
    <rect x="986" y="80" width="26" height="26" rx="6" fill="#202020" stroke="#383838"/>
    <circle cx="999" cy="88" r="1.4" fill="#9b9b9b"/><circle cx="999" cy="93" r="1.4" fill="#9b9b9b"/><circle cx="999" cy="98" r="1.4" fill="#9b9b9b"/>
    <!-- run -->
    <rect x="1020" y="80" width="60" height="26" rx="6" fill="#8b5cf6"/>
    <path d="M1035 87l8 6-8 6z" fill="#fff"/>
    <text x="1049" y="97" fill="#fff" class="base" font-weight="600">Run</text>
  </g>

  <!-- LEFT: steps list -->
  <g>
    <text x="44" y="150" class="faint xs">STEPS</text>
    <rect x="300" y="138" width="82" height="20" rx="6" fill="none" stroke="#3a3a3a"/>
    <text x="313" y="152" class="accent sm" font-weight="600">＋ Add step</text>

    <!-- step row template: y start 168, h 44 -->
    <!-- 1 -->
    <g>
      <text x="44" y="196" class="faint sm">⠿</text>
      <circle cx="70" cy="190" r="10" fill="#242424"/><text x="70" y="194" text-anchor="middle" class="mut sm">1</text>
      <text x="90" y="195" class="norm base">Strip Frontmatter</text>
      <rect x="286" y="181" width="52" height="18" rx="9" fill="#182740"/><text x="312" y="194" text-anchor="middle" fill="#6ea8fe" class="xs" font-size="10" font-weight="600">SCENE</text>
      <line x1="44" y1="212" x2="360" y2="212" stroke="#262626"/>
    </g>
    <!-- 2 -->
    <g>
      <text x="44" y="240" class="faint sm">⠿</text>
      <circle cx="70" cy="234" r="10" fill="#242424"/><text x="70" y="238" text-anchor="middle" class="mut sm">2</text>
      <text x="90" y="239" class="norm base">Remove Links</text>
      <rect x="286" y="225" width="52" height="18" rx="9" fill="#182740"/><text x="312" y="238" text-anchor="middle" fill="#6ea8fe" class="xs" font-size="10" font-weight="600">SCENE</text>
      <line x1="44" y1="256" x2="360" y2="256" stroke="#262626"/>
    </g>
    <!-- 3 selected -->
    <g>
      <rect x="30" y="260" width="340" height="44" rx="8" fill="#26243a"/>
      <rect x="30" y="260" width="3" height="44" rx="1.5" fill="#8b5cf6"/>
      <text x="44" y="288" class="mut sm">⠿</text>
      <circle cx="70" cy="282" r="10" fill="#8b5cf6"/><text x="70" y="286" text-anchor="middle" fill="#fff" class="sm">3</text>
      <text x="90" y="287" class="h base">Prepend Title</text>
      <rect x="286" y="273" width="52" height="18" rx="9" fill="#182740"/><text x="312" y="286" text-anchor="middle" fill="#6ea8fe" class="xs" font-size="10" font-weight="600">SCENE</text>
    </g>
    <!-- 4 -->
    <g>
      <text x="44" y="332" class="faint sm">⠿</text>
      <circle cx="70" cy="326" r="10" fill="#242424"/><text x="70" y="330" text-anchor="middle" class="mut sm">4</text>
      <text x="90" y="331" class="norm base">Concatenate Text</text>
      <rect x="292" y="317" width="46" height="18" rx="9" fill="#3a2e12"/><text x="315" y="330" text-anchor="middle" fill="#e0a52b" class="xs" font-size="10" font-weight="600">JOIN</text>
      <line x1="44" y1="348" x2="360" y2="348" stroke="#262626"/>
    </g>
    <!-- 5 -->
    <g>
      <text x="44" y="376" class="faint sm">⠿</text>
      <circle cx="70" cy="370" r="10" fill="#242424"/><text x="70" y="374" text-anchor="middle" class="mut sm">5</text>
      <text x="90" y="375" class="norm base">Add Frontmatter</text>
      <rect x="266" y="361" width="72" height="18" rx="9" fill="#12331f"/><text x="302" y="374" text-anchor="middle" fill="#52c294" class="xs" font-size="10" font-weight="600">MANUSCRIPT</text>
      <line x1="44" y1="392" x2="360" y2="392" stroke="#262626"/>
    </g>
    <!-- 6 -->
    <g>
      <text x="44" y="420" class="faint sm">⠿</text>
      <circle cx="70" cy="414" r="10" fill="#242424"/><text x="70" y="418" text-anchor="middle" class="mut sm">6</text>
      <text x="90" y="419" class="norm base">Save as Note</text>
      <rect x="266" y="405" width="72" height="18" rx="9" fill="#12331f"/><text x="302" y="418" text-anchor="middle" fill="#52c294" class="xs" font-size="10" font-weight="600">MANUSCRIPT</text>
      <line x1="44" y1="436" x2="360" y2="436" stroke="#262626"/>
    </g>
    <!-- add step ghost -->
    <rect x="30" y="448" width="340" height="34" rx="8" fill="none" stroke="#333" stroke-dasharray="4 4"/>
    <text x="200" y="470" text-anchor="middle" class="faint base">＋  Add step</text>

    <text x="44" y="620" class="sm" fill="#52c294">✓ Valid · runs 6 steps</text>
  </g>

  <!-- divider between columns -->
  <line x1="392" y1="130" x2="392" y2="642" stroke="#2a2a2a"/>

  <!-- RIGHT: config for selected step -->
  <g>
    <text x="416" y="150" class="h lg">Prepend Title</text>
    <rect x="556" y="138" width="52" height="18" rx="9" fill="#182740"/><text x="582" y="151" text-anchor="middle" fill="#6ea8fe" class="xs" font-size="10" font-weight="600">SCENE</text>
    <text x="416" y="172" class="mut base">Prepends the scene’s title to its text before scenes are joined.</text>
    <line x1="416" y1="188" x2="1072" y2="188" stroke="#262626"/>

    <!-- field 1 -->
    <text x="416" y="218" class="norm base" font-weight="600">Title format</text>
    <circle cx="512" cy="213" r="7" fill="none" stroke="#5a5a5a"/><text x="512" y="217" text-anchor="middle" class="faint" font-size="9">i</text>
    <rect x="416" y="228" width="656" height="34" rx="6" fill="#202020" stroke="#383838"/>
    <text x="430" y="250" class="norm base mono">$3{#} $1</text>
    <text x="416" y="280" class="faint sm">$1 = title · $2 = scene number · $3{…} repeats per indent level  (hover ⓘ for full help)</text>

    <!-- field 2 -->
    <text x="416" y="316" class="norm base" font-weight="600">Separator</text>
    <circle cx="486" cy="311" r="7" fill="none" stroke="#5a5a5a"/><text x="486" y="315" text-anchor="middle" class="faint" font-size="9">i</text>
    <rect x="416" y="326" width="656" height="34" rx="6" fill="#202020" stroke="#383838"/>
    <text x="430" y="348" class="norm base mono">\n\n</text>
    <text x="416" y="378" class="faint sm">Text placed between the title and the scene body.</text>

    <line x1="416" y1="398" x2="1072" y2="398" stroke="#262626"/>

    <!-- live preview -->
    <text x="416" y="424" class="faint xs">LIVE PREVIEW  ·  first scene</text>
    <rect x="416" y="434" width="656" height="150" rx="8" fill="#141414" stroke="#2a2a2a"/>
    <text x="436" y="462" class="mono base" fill="#a78bfa"># Opening Image</text>
    <text x="436" y="492" class="mono base norm">The morning fog had not yet lifted when</text>
    <text x="436" y="512" class="mono base norm">Mara reached the harbour wall, and the</text>
    <text x="436" y="532" class="mono base norm">lamps were still burning against it…</text>
    <text x="436" y="566" class="mono sm faint">— rendered with steps 1–3 applied to scene 1</text>
  </g>

  <!-- bottom status bar -->
  <line x1="24" y1="642" x2="1096" y2="642" stroke="#2a2a2a"/>
  <circle cx="40" cy="669" r="4" fill="#52c294"/>
  <text x="54" y="673" class="mut base">Ready · outputs to <tspan class="norm mono">manuscript.md</tspan></text>
  <text x="1072" y="673" text-anchor="end" class="faint sm">6 steps · Scene ×3 · Join ×1 · Manuscript ×2</text>

  <!-- caption -->
  <text x="24" y="702" class="faint sm">Steps collapse to one line — no more endless scroll. Only the selected step’s options show on the right. Color-coded kinds, live preview, Run always visible.</text>
</svg>
